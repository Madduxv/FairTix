spring.application.name=fairtix-test

# In-memory H2 database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway in tests (H2 uses Hibernate ddl-auto instead)
spring.flyway.enabled=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Auth
JWT_SECRET=test-secret-key-for-unit-tests-only-not-for-production-use-min-32-chars

# Redis (for CI integration)
spring.redis.host=redis
spring.redis.port=6379
# Seat Holds
holds.duration-minutes=10
holds.max-duration-minutes=60
holds.cleanup.interval-ms=60000
holds.max-seats-per-hold=10
# Keep limit small so tests don't need to create many seats
holds.max-active-per-holder=2
