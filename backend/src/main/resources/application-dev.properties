# Override cookie security for local development (HTTP)
app.cookie.secure=false

# Allow simulated payment outcomes in dev (4242=success, 4000=decline, 4111=cancel)
fairtix.payment.allow-simulated-outcome=true

# SQL debug logging — dev only, never ship to prod
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
