spring.application.name=fairtix

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5113/fairtix}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=DEBUG
# ^^ dev only
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}

# Seat Holds
holds.duration-minutes=10
holds.max-duration-minutes=60
holds.cleanup.interval-ms=30000
holds.max-seats-per-hold=10
holds.max-active-per-holder=5

# Queue
queue.admission-window-minutes=15
queue.max-admission-batch=50
queue.admission.interval-ms=30000
queue.expiration.interval-ms=30000

# Rate Limiting
ratelimit.auth=10
ratelimit.orders=20
ratelimit.seats=60
ratelimit.default=100

# Cookie Security
app.cookie.secure=true

# Login Attempt Lockout
auth.max-login-attempts=5
auth.lockout-duration-minutes=15

# Google reCAPTCHA (disabled by default; set secret via RECAPTCHA_SECRET env var)
auth.recaptcha.enabled=${RECAPTCHA_ENABLED:false}
auth.recaptcha.failure-threshold=3
recaptcha.secret=${RECAPTCHA_SECRET:}

# Stripe
stripe.enabled=${STRIPE_ENABLED:false}
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Payment Simulation
fairtix.payment.allow-simulated-outcome=false

# Refunds
fairtix.refund.enabled=true
fairtix.refund.time-window-days=14
fairtix.refund.auto-approve-threshold=50.00

# Logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger - %msg%n

# Email (SMTP)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
app.mail.from=${MAIL_FROM:noreply@fairtix.com}
app.base-url=${APP_BASE_URL:http://localhost:3000}

# Fraud Detection
fraud.analysis.interval-ms=300000
fraud.flag.dedup-window-minutes=30
fraud.rules.rapid-hold-count=5
fraud.rules.rapid-hold-window-minutes=2
fraud.rules.volume-anomaly-count=10
fraud.rules.volume-anomaly-window-minutes=10
fraud.rules.high-release-rate-threshold=0.8
fraud.rules.high-release-rate-window-minutes=60
fraud.rules.failed-payment-count=3

# Risk Scoring
fraud.score.low-severity-points=5
fraud.score.medium-severity-points=15
fraud.score.high-severity-points=30
fraud.score.payment-failure-points=20
fraud.score.new-account-points=10
fraud.score.payment-failure-threshold=3
fraud.score.new-account-hours=24
fraud.score.decay-cron=0 0 2 * * *
fraud.rules.failed-payment-window-hours=24

# Step-Up Verification
fraud.stepup.verified-ttl-minutes=15
fraud.stepup.high-tier-checkout-enabled=true
fraud.stepup.critical-any-action-enabled=true
fraud.stepup.rapid-hold-cycling-enabled=true

# Geolocation / Nearby Events
geo.nearby.default-radius-km=50
geo.nearby.max-radius-km=500

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
